{% extends 'base.html' %}

{% block content %}

<h2>📦 Available Boxes</h2>

<div style="display:flex; gap:20px; flex-wrap:wrap;">

{% for product in products %}
<div style="width:250px; border:1px solid #ddd; padding:15px; border-radius:10px;">

    <h3>{{ product.name }}</h3>
    <p>{{ product.description }}</p>
    <p><b>₹{{ product.price }}</b></p>

    <a href="{% url 'add_to_cart' product.id %}" 
       style="background:#007bff; color:white; padding:8px 12px; border-radius:6px; text-decoration:none;">
       Add to Cart
    </a>

</div>
{% endfor %}

</div>

{% endblock %}
