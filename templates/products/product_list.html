{% extends 'base.html' %}

{% block content %}

<h2>📦 Available Boxes</h2>

<div class="product-grid">

    {% for box in boxes %}
    <div class="product-card">

        <img src="{{ box.image.url }}" alt="{{ box.name }}">

        <h3>{{ box.name }}</h3>

        <p>{{ box.description|truncatewords:10 }}</p>

        <div class="price">₹{{ box.price }}</div>

        <div class="stock">
            {% if box.stock > 0 %}
                In Stock
            {% else %}
                Out of Stock
            {% endif %}
        </div>

        <a href="/orders/add/{{ box.id }}/" class="btn">Add to Cart</a>

    </div>
    {% endfor %}

</div>

{% endblock %}
