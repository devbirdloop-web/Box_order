{% extends 'base.html' %}

{% block content %}

<div class="dashboard-header">
    <div>
        <h1 class="dashboard-title">{{ title }}</h1>
        <p class="dashboard-subtitle">Fill product details for box ordering.</p>
    </div>
</div>

<div class="form-card">
    <form method="POST" enctype="multipart/form-data">
        {% csrf_token %}

        {{ form.as_p }}

        <button type="submit" class="btn">Save Product</button>
        <a href="{% url 'manage_products' %}" class="secondary-btn">Cancel</a>
    </form>
</div>

{% endblock %}
